# PseudoLife-MCP full stack: Postgres substrate + the memory daemon + the
# extractor sidecar. The compose PROJECT is named `pseudolife-mcp` (below) so it
# shows up clearly in Docker Desktop instead of as the folder name ("ops").
#
#   First time on a fresh machine (creates the two persistent volumes):
#     docker volume create pseudolife-mcp-bank
#     docker volume create pseudolife-mcp-state
#   Then, every time:
#     docker compose -f ops/docker-compose.yml up -d --build   # start / rebuild
#     docker compose -f ops/docker-compose.yml stop|start      # cycle, data safe
#
# ── EXISTING INSTALL (volumes created before the rename) ──────────────────────
# Earlier installs created `ops_pseudolife_pgdata` / `ops_pseudolife_data`. Do NOT
# rename those volumes (renaming external volumes is a data-migration). Instead,
# keep pointing at them by creating `ops/.env` with:
#     PSEUDOLIFE_BANK_VOLUME=ops_pseudolife_pgdata
#     PSEUDOLIFE_STATE_VOLUME=ops_pseudolife_data
# If you forget, `up` fails SAFELY with "external volume not found" (external
# volumes are never auto-created or wiped) — it just reminds you to set the .env.
#
# ⚠️  TWO VOLUMES HOLD STATE. The bank volume (default `pseudolife-mcp-bank`) is
#     the canonical bank (entries + facts + graph). The state volume (default
#     `pseudolife-mcp-state`) holds the daemon's learned neural weights + ChromaDB
#     + cortex snapshot. To rebuild images (e.g. CVE hardening) use `up -d --build`
#     or `stop`/`start` — these keep both volumes. NEVER use `down -v`,
#     `docker volume rm`, or `docker system prune --volumes`: they DELETE state.
#     (Both volumes are `external` below so `down -v` skips them, but the manual
#     volume commands still bite — and always `ops/backup.ps1` before any teardown.)
#
# Ports bind 127.0.0.1 only. Postgres (5433) is never exposed beyond the
# compose network + loopback; the daemon (8765) is the only thing Claude
# Code talks to — point it at  http://127.0.0.1:8765/mcp  (HTTP transport,
# no stdio shim). Host port 5433 avoids collisions with a native Postgres.
#
# Postgres password: defaults to `pseudolife` (loopback-only, so the network
# boundary — not the password — is the real guard). To use your own, set
# POSTGRES_PASSWORD in ops/.env BEFORE the first `up` (the postgres image only
# applies it when initializing a fresh volume; changing it later means
# `docker exec pseudolife-mcp-postgres psql -U pseudolife -d postgres -c
# "ALTER USER pseudolife PASSWORD '<new>'"` plus updating ops/.env to match).
name: pseudolife-mcp
services:
  pseudolife-pg:
    build:
      context: .
      dockerfile: Dockerfile.pg
    image: pseudolife-pg:16
    container_name: pseudolife-mcp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pseudolife
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pseudolife}
      POSTGRES_DB: pseudolife_memory
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pseudolife_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pseudolife -d pseudolife_memory"]
      interval: 10s
      timeout: 5s
      retries: 5

  pseudolife-daemon:
    build:
      # Context is the repo root (compose file lives in ops/), so the
      # Dockerfile can copy the pseudolife_memory package + pyproject.
      context: ..
      dockerfile: ops/Dockerfile.daemon
    # Keep this tag in step with the package version in pyproject.toml; the
    # update scripts read it from here (single source of truth for deploys).
    image: pseudolife-daemon:0.6.0
    container_name: pseudolife-mcp-daemon
    restart: unless-stopped
    depends_on:
      pseudolife-pg:
        condition: service_healthy
      pseudolife-extractor:
        condition: service_started
    environment:
      # Reaches Postgres over the compose network by service name (internal
      # port 5432, not the host-published 5433). Password mirrors the pg
      # service above — override both via POSTGRES_PASSWORD in ops/.env.
      PSEUDOLIFE_MCP_DATABASE_URL: postgresql://pseudolife:${POSTGRES_PASSWORD:-pseudolife}@pseudolife-pg:5432/pseudolife_memory
      PSEUDOLIFE_MCP_HOST: 0.0.0.0
      PSEUDOLIFE_MCP_PORT: "8765"
      PSEUDOLIFE_MCP_DATA_DIR: /data
      # Local timezone for daemon-generated episode titles (the container is
      # UTC by default). Set TZ in ops/.env to your zone (e.g. Australia/Sydney)
      # so "session - YYYY-MM-DD HH:MM" titles read in local time.
      TZ: ${TZ:-UTC}
      # The 0.0.0.0 bind is safe here: the port below publishes only to
      # 127.0.0.1, so the network boundary is the Docker mapping, not the
      # bind host. This flag tells the daemon's guard exactly that.
      PSEUDOLIFE_MCP_TRUST_BIND: "1"
      # Writer identity stamped on every canonical write (schema v11).
      PSEUDOLIFE_WRITER_ID: claude-code
      # Tool-surface tier: "full" (default, all tools) or "core" (lean ~15-tool
      # set for weak-model / token-conscious clients). Uncomment to opt in.
      # PSEUDOLIFE_MCP_TOOLSET: core
      CUDA_VISIBLE_DEVICES: "-1"
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      # Single-writer cortex: the LLM dream pass is the sole automatic cortex
      # writer, so the extractor sidecar (below) is a default stack member and
      # dream consolidation routes to it.
      PSEUDOLIFE_DREAM_BASE_URL: http://pseudolife-extractor:8081/v1
      PSEUDOLIFE_DREAM_MODEL: extractor
      # The CPU Gemma sidecar generates at ~30 tok/s, so dream extraction needs
      # well over the old 20s default (a full 2048-tok generation is ~70s). 240s
      # gives headroom incl. slower end-user laptops; bump for a larger model.
      PSEUDOLIFE_DREAM_TIMEOUT_SECONDS: "240"
      PSEUDOLIFE_DREAM_MAX_TOKENS: "2048"
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - pseudolife_data:/data

  # CPU LLM extractor for dream consolidation. Default-on (single-writer cortex):
  # without it, the cortex is populated only by explicit memory_fact_set, and the
  # daemon logs a startup warning. Internal-only — the daemon reaches it by service
  # name on the compose network; never published to host (no `ports:`).
  pseudolife-extractor:
    build:
      context: ..
      dockerfile: ops/Dockerfile.extractor
    image: pseudolife-extractor:gemma4-e2b
    container_name: pseudolife-mcp-extractor
    restart: unless-stopped
    expose:
      - "8081"
    # The base llama.cpp image bakes a healthcheck against port 8080; our server
    # listens on 8081, so override it (else the container reports "unhealthy"
    # despite serving fine). start_period covers model load.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    # Benchmark/swap: mount a different GGUF over the baked default without a
    # rebuild, e.g.:
    #   volumes:
    #     - ../evals/models/gemma-4-E4B-it-Q4_K_M.gguf:/models/extractor.gguf:ro

volumes:
  # External so `docker compose down -v` cannot remove them — the bank survives
  # any container teardown/rebuild. New installs create the clean defaults:
  #   docker volume create pseudolife-mcp-bank
  # Existing installs override to their pre-rename names via ops/.env (see header).
  pseudolife_pgdata:
    external: true
    name: ${PSEUDOLIFE_BANK_VOLUME:-pseudolife-mcp-bank}
  # Daemon state (neural weights + ChromaDB + cortex snapshot). External for the
  # same reason as the bank — survives any container teardown/rebuild.
  #   docker volume create pseudolife-mcp-state
  pseudolife_data:
    external: true
    name: ${PSEUDOLIFE_STATE_VOLUME:-pseudolife-mcp-state}
